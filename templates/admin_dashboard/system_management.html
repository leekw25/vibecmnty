{% extends "admin_dashboard/base.html" %}

{% block admin_content %}
<section class="admin-two-column">
  <article class="vibe-card">
    <h2 class="admin-section-title">기본 설정</h2>
    <p class="admin-note">운영 정책과 화면 노출 정책을 추적하기 위한 진입점입니다.</p>
    <ul class="admin-list">
      <li class="admin-list-item">관리자 역할 정책: <code>accounts.User.role</code> 기반</li>
      <li class="admin-list-item">계정 상태 정책: <code>is_active</code> 토글 방식</li>
      <li class="admin-list-item">콘텐츠 삭제: 게시글, 댓글, 공지사항, 투표, 일정 관리</li>
    </ul>
  </article>

  <article class="vibe-card">
    <h2 class="admin-section-title">백업 도구 (향후 확장)</h2>
    <p class="admin-note">향후 DB 백업과 복구 자동화 기능으로 확장할 수 있습니다.</p>
    <div class="admin-actions">
      <button class="vibe-btn vibe-btn-ghost" disabled>백업 실행 준비중</button>
      <a href="/admin/" class="vibe-btn vibe-btn-primary">Django Admin 열기</a>
    </div>
  </article>
</section>
{% endblock %}
