{% extends "admin_dashboard/base.html" %}

{% block admin_content %}
<section class="grid gap-4 md:grid-cols-2">
  <article class="vibe-card">
    <h2 class="font-bold">기본 설정</h2>
    <p class="text-sm text-slate-500 mt-1">운영 정책과 화면 노출 정책을 추적하기 위한 진입점입니다.</p>
    <ul class="mt-3 space-y-2 text-sm">
      <li class="rounded-lg border border-slate-200 bg-white/70 p-2">관리자 역할 정책: `accounts.User.role` 기반</li>
      <li class="rounded-lg border border-slate-200 bg-white/70 p-2">계정 상태 정책: `is_active` 토글 방식</li>
      <li class="rounded-lg border border-slate-200 bg-white/70 p-2">콘텐츠 삭제: 게시글/댓글/공지사항/투표/일정</li>
    </ul>
  </article>

  <article class="vibe-card">
    <h2 class="font-bold">백업 도구 (향후 확장)</h2>
    <p class="text-sm text-slate-500 mt-1">향후 DB 백업/복구 자동화로 확장 가능합니다.</p>
    <div class="mt-3">
      <button class="vibe-btn vibe-btn-ghost" disabled>백업 실행 (준비중)</button>
      <a href="/admin/" class="vibe-btn vibe-btn-primary ml-2">Django Admin 열기</a>
    </div>
  </article>
</section>
{% endblock %}
