{% extends "admin_dashboard/base.html" %}

{% block admin_content %}
<section class="space-y-4">
  <div class="flex flex-wrap gap-2">
    <a href="{% url 'notices:create' %}" class="vibe-btn vibe-btn-primary">공지사항 등록</a>
    <a href="{% url 'notices:list' %}" class="vibe-btn vibe-btn-ghost">사용자 화면으로</a>
  </div>

  <form method="get" class="vibe-card flex gap-2 flex-wrap" action="{% url 'admin_dashboard:notices' %}">
    <input type="text" name="q" value="{{ q }}" placeholder="공지사항 검색" class="vibe-input flex-1 min-w-[180px]">
    <button type="submit" class="vibe-btn vibe-btn-primary">검색</button>
  </form>

  <form method="post" action="{% url 'admin_dashboard:notices' %}" class="vibe-card">
    {% csrf_token %}
    <div class="flex flex-wrap items-center gap-2">
      <p class="text-sm text-slate-600 mr-2">총 {{ notice_count }}건</p>
      <button type="submit" name="action" value="delete" class="vibe-btn vibe-btn-danger">선택 삭제</button>
    </div>

    <div class="mt-3 space-y-2">
      {% for notice in notices %}
        <label class="block border rounded-lg border-slate-200 bg-white/70 p-3">
          <div class="flex items-center justify-between gap-3">
            <div class="flex items-center gap-3 min-w-0">
              <input type="checkbox" name="notice_ids" value="{{ notice.id }}" class="h-4 w-4">
              <div class="min-w-0">
                <p class="font-semibold truncate">{{ notice.title }}{% if notice.is_important %} <span class="text-xs px-2 py-0.5 bg-sky-100 text-sky-700 rounded-full">중요</span>{% endif %}</p>
                <p class="text-xs text-slate-500">작성자: {{ notice.author.username }} / {{ notice.created_at }}</p>
              </div>
            </div>
            <div class="flex flex-wrap gap-2">
              <a href="{% url 'notices:detail' notice.id %}" class="vibe-btn vibe-btn-ghost py-1">조회</a>
              <a href="{% url 'notices:update' notice.id %}" class="vibe-btn vibe-btn-primary py-1">수정</a>
              <form method="post" action="{% url 'notices:delete' notice.id %}" class="inline-block">
                {% csrf_token %}
                <button type="submit" class="vibe-btn vibe-btn-danger py-1">삭제</button>
              </form>
            </div>
          </div>
        </label>
      {% empty %}
        <p class="text-sm text-slate-500">등록된 공지사항이 없습니다.</p>
      {% endfor %}
    </div>
  </form>
</section>
{% endblock %}
