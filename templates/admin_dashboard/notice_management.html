{% extends "admin_dashboard/base.html" %}

{% block admin_content %}
<section class="admin-actions">
  <a href="{% url 'notices:create' %}" class="vibe-btn vibe-btn-primary">공지사항 등록</a>
  <a href="{% url 'notices:list' %}" class="vibe-btn vibe-btn-ghost">사용자 화면으로</a>
</section>

<form method="get" class="vibe-card admin-toolbar" action="{% url 'admin_dashboard:notices' %}">
  <input type="text" name="q" value="{{ q }}" placeholder="공지사항 검색" class="vibe-input">
  <button type="submit" class="vibe-btn vibe-btn-primary">검색</button>
</form>

<form method="post" action="{% url 'admin_dashboard:notices' %}" class="vibe-card">
  {% csrf_token %}
  <div class="admin-toolbar">
    <p class="admin-count">총 {{ notice_count }}건</p>
    <button type="submit" name="action" value="delete" class="vibe-btn vibe-btn-danger">선택 삭제</button>
  </div>

  <div class="admin-list">
    {% for notice in notices %}
      <label class="admin-list-item admin-check-row">
        <input type="checkbox" name="notice_ids" value="{{ notice.id }}">
        <span class="admin-row-body">
          <span class="admin-item-title">
            {{ notice.title }}
            {% if notice.is_important %}<span class="vibe-chip">중요</span>{% endif %}
          </span>
          <span class="admin-item-meta">작성자 {{ notice.author.username }} · {{ notice.created_at }}</span>
        </span>
        <span class="admin-actions">
          <a href="{% url 'notices:detail' notice.id %}" class="vibe-btn vibe-btn-ghost">조회</a>
          <a href="{% url 'notices:update' notice.id %}" class="vibe-btn vibe-btn-primary">수정</a>
        </span>
      </label>
    {% empty %}
      <p class="admin-empty">등록된 공지사항이 없습니다.</p>
    {% endfor %}
  </div>
</form>
{% endblock %}
