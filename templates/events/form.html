{% extends "base.html" %}

{% block content %}
<section class="vibe-card max-w-2xl fade-up">
  <h2 class="text-xl font-semibold mb-4">{{ title }}</h2>

  <form method="post" class="space-y-4">
    {% csrf_token %}
    {% for field in form %}
      <label class="block text-sm font-medium text-slate-700">{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}
        <p class="text-sm text-rose-600">{{ field.errors|striptags }}</p>
      {% endif %}
      {% if field.help_text %}
        <p class="mt-1 text-xs text-slate-500">{{ field.help_text }}</p>
      {% endif %}
    {% endfor %}

    <div class="flex gap-2">
      <button type="submit" class="vibe-btn vibe-btn-primary">{{ submit_label }}</button>
      <a href="{% url 'events:calendar' %}" class="vibe-btn vibe-btn-ghost">취소</a>
    </div>
  </form>
</section>
{% endblock %}
