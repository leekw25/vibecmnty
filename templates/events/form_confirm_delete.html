{% extends "base.html" %}

{% block content %}
<section class="vibe-card max-w-lg fade-up">
  <h2 class="text-xl font-bold mb-4">{{ title }}</h2>
  <p class="mb-4 text-slate-700">정말 "{{ event.title }}" 일정을 삭제할까요?</p>

  <form method="post" class="flex gap-2">
    {% csrf_token %}
    <button type="submit" class="vibe-btn vibe-btn-danger">삭제</button>
    <a href="{% url 'events:detail' event.id %}" class="vibe-btn vibe-btn-ghost">취소</a>
  </form>
</section>
{% endblock %}
